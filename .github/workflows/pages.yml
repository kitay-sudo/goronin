# Pages — собирает статический лендинг и публикует его через GitHub Pages.
#
# Триггер: push в main (только если изменился frontend/), плюс ручной запуск.
# Деплой через официальные actions/deploy-pages — никаких сторонних tokens
# или gh-pages бренчей.
#
# Перед первым запуском нужно один раз вручную:
#   Settings → Pages → Build and deployment → Source: GitHub Actions

name: pages

on:
  push:
    branches: [main]
    paths:
      - "frontend/**"
      - ".github/workflows/pages.yml"
  workflow_dispatch:

# Разрешаем actions/deploy-pages писать в Pages env.
permissions:
  contents: read
  pages: write
  id-token: write

# Один активный деплой за раз; новый push отменяет предыдущий незавершённый
# деплой, чтобы избежать гонок и зря не тратить минуты.
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    name: build static site
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install
        run: npm ci

      - name: Build
        env:
          # GitHub Pages для проектного репо обслуживает сайт по
          # https://<user>.github.io/<repo>/, поэтому ассеты должны ссылаться
          # оттуда же. Путь определяется автоматически из github.repository.
          VITE_BASE: /${{ github.event.repository.name }}/
        run: npm run build

      - name: Add 404.html (SPA fallback)
        # GitHub Pages не умеет fallback на index.html для путей без файла.
        # Копируем index.html как 404.html, чтобы клиент-сайд router
        # (если когда-то добавим) работал по любому URL.
        run: cp dist/index.html dist/404.html

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: frontend/dist

  deploy:
    name: deploy to Pages
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4
